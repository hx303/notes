<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>📝 笔记管理后台</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="wouldkeep" />
<link rel="apple-touch-icon" href="/admin/icon-192.png" />
<link rel="manifest" href="/admin/manifest.json" />
<meta name="theme-color" content="#16213e" />

<!-- Toast UI Editor -->
<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
<link rel="stylesheet" href="https://uicdn.toast.com/editor-plugin-code-syntax-highlight/latest/toastui-editor-plugin-code-syntax-highlight.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{background:#16213e;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460;flex-shrink:0;min-height:44px;gap:8px}
.header h1{font-size:16px;color:#e94560;white-space:nowrap;flex-shrink:0}
.header .actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}

/* Hamburger menu button - hidden on desktop */
.hamburger{display:none;background:transparent!important;border:none!important;font-size:20px;cursor:pointer;padding:4px 6px!important;color:#e0e0e0;flex-shrink:0;line-height:1}
.hamburger:hover{opacity:0.7}

.main{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:260px;min-width:260px;max-width:85vw;background:#16213e;overflow-y:auto;border-right:1px solid #0f3460;padding:8px 0;flex-shrink:0;transition:transform .25s cubic-bezier(0.4,0,0.2,1);z-index:50}
.sidebar .folder{margin:1px 0}
.sidebar .folder-header{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:13px;color:#a0a0b0;user-select:none;-webkit-tap-highlight-color:transparent}
.sidebar .folder-header:hover{background:#0f3460}
.sidebar .folder-header .arrow{font-size:9px;transition:transform .2s}
.sidebar .folder.open>.folder-header .arrow{transform:rotate(90deg)}
.sidebar .folder .files{max-height:0;overflow:hidden;transition:max-height .3s}
.sidebar .folder.open .files{max-height:4000px}
.sidebar .file{padding:10px 14px 10px 30px;cursor:pointer;font-size:13px;color:#c0c0d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-tap-highlight-color:transparent;min-height:40px;display:flex;align-items:center}
.sidebar .file:hover{background:#0f3460}
.sidebar .file.active{background:#e94560;color:#fff}

/* Sidebar overlay for mobile */
.sidebar-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:40}

.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.toolbar{background:#16213e;padding:4px 8px;display:flex;align-items:center;gap:4px;border-bottom:1px solid #0f3460;flex-shrink:0;min-height:30px;overflow:hidden}
.toolbar .path{flex:1;font-size:10px;color:#a0a0b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.toolbar .status{font-size:9px;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.toolbar .status.idle{background:#333;color:#888}
.toolbar .status.saved{background:#155724;color:#4caf50}
.toolbar .status.error{background:#721c24;color:#f44336}
.toolbar .status.saving{background:#1a5c2a;color:#81c784}
.toolbar .mode-indicator{font-size:9px;padding:1px 5px;border-radius:3px;background:#0f3460;color:#e94560;white-space:nowrap;flex-shrink:0}

.editor-wrap{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}

/* Toast UI theme override - compact dark mode */
.toastui-editor-defaultUI{border:none!important;border-radius:0!important;flex:1 1 0%!important}
.toastui-editor-defaultUI-toolbar{background:#16213e!important;border-color:#0f3460!important;flex-wrap:nowrap!important;overflow-x:auto;padding:2px 6px!important;min-height:0!important;line-height:1!important}
.toastui-editor-defaultUI-toolbar button{color:#c0c0d0!important;border-color:transparent!important;min-width:26px!important;height:26px!important;margin:0 1px!important;padding:2px!important}
.toastui-editor-defaultUI-toolbar button:hover{background:#0f3460!important;color:#fff!important}
.toastui-editor-defaultUI-toolbar button.active{background:#e94560!important;color:#fff!important}
.toastui-editor-mode-switch{background:#0f3460!important;border-color:#1a4a8a!important;min-height:0!important;padding:0!important}
.toastui-editor-mode-switch .tab-item{color:#888!important;font-size:11px!important;padding:2px 10px!important;line-height:1.4!important}
.toastui-editor-mode-switch .tab-item.active{background:#e94560!important;color:#fff!important}
.toastui-editor-main{min-height:0!important;flex:1 1 0%!important}
.toastui-editor-md-container{background:#1a1a2e!important;flex:1 1 0%!important}
.toastui-editor-md-container .toastui-editor{background:#1a1a2e!important;color:#e0e0e0!important}
.toastui-editor-md-preview{background:#1e1e35!important}
.toastui-editor-ww-container{background:#1a1a2e!important}
.toastui-editor-ww-container .toastui-editor{background:#1a1a2e!important;color:#e0e0e0!important}
.ProseMirror{color:#e0e0e0!important;min-height:100%!important}
.ProseMirror h1{color:#e94560!important}
.ProseMirror h2{color:#ff6b6b!important}
.ProseMirror h3{color:#ffa07a!important}
.ProseMirror code{background:#2d2d4a!important;color:#81c784!important}
.ProseMirror pre{background:#2d2d4a!important}
.ProseMirror blockquote{border-left-color:#e94560!important;color:#a0a0b0!important}
.ProseMirror a{color:#e94560!important}
.toastui-editor-contents{font-size:15px!important;line-height:1.8!important}
/* Hide mode switch (we have our own toggle) */
.toastui-editor-mode-switch{display:none!important}

/* ===== Light theme ===== */
body.light{background:#f5f5f5;color:#333}
body.light .header{background:#fff;border-color:#e0e0e0}
body.light .header h1{color:#c0392b}
body.light .sidebar{background:#fff;border-color:#e0e0e0}
body.light .sidebar .folder-header{color:#555}
body.light .sidebar .folder-header:hover{background:#eee}
body.light .sidebar .file{color:#444}
body.light .sidebar .file:hover{background:#eee}
body.light .sidebar .file.active{background:#c0392b;color:#fff}
body.light .toolbar{background:#fff;border-color:#e0e0e0}
body.light .toolbar .path{color:#888}
body.light .toolbar .status.idle{background:#e0e0e0;color:#666}
body.light .toolbar .status.saved{background:#e8f5e9;color:#2e7d32}
body.light .toolbar .status.error{background:#ffebee;color:#c0392b}
body.light .toolbar .status.saving{background:#fff3e0;color:#e65100}
body.light .mode-indicator{background:#f0f0f0;color:#c0392b}
body.light .toastui-editor-defaultUI-toolbar{background:#f5f5f5!important;border-color:#ddd!important;padding:2px 6px!important}
body.light .toastui-editor-defaultUI-toolbar button{color:#333!important;min-width:26px!important;height:26px!important;margin:0 1px!important;padding:2px!important}
body.light .toastui-editor-defaultUI-toolbar button:hover{background:#e0e0e0!important;color:#000!important}
body.light .toastui-editor-defaultUI-toolbar button.active{background:#c0392b!important;color:#fff!important}
body.light .toastui-editor-mode-switch{background:#f0f0f0!important;border-color:#ddd!important}
body.light .toastui-editor-mode-switch .tab-item{color:#666!important}
body.light .toastui-editor-mode-switch .tab-item.active{background:#c0392b!important;color:#fff!important}
body.light .toastui-editor-md-container{background:#fff!important}
body.light .toastui-editor-md-container .toastui-editor{background:#fff!important;color:#333!important}
body.light .toastui-editor-md-preview{background:#fafafa!important}
body.light .toastui-editor-ww-container{background:#fff!important}
body.light .toastui-editor-ww-container .toastui-editor{background:#fff!important;color:#333!important}
body.light .ProseMirror{color:#333!important}
body.light .ProseMirror h1{color:#c0392b!important}
body.light .ProseMirror h2{color:#d35400!important}
body.light .ProseMirror h3{color:#e67e22!important}
body.light .ProseMirror code{background:#f0f0f0!important;color:#c0392b!important}
body.light .ProseMirror pre{background:#f0f0f0!important}
body.light .ProseMirror blockquote{border-left-color:#c0392b!important;color:#666!important}
body.light .ProseMirror a{color:#c0392b!important}
body.light .toastui-editor-contents{color:#333!important}
body.light button{background:#e0e0e0;color:#333}
body.light button:hover{background:#ccc}
body.light button.primary{background:#c0392b;color:#fff}
body.light button.primary:hover{background:#e74c3c}
body.light button.toggle-btn{background:#f0f0f0;border-color:#ddd;color:#666}
body.light button.toggle-btn.wysiwyg{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}
body.light ::-webkit-scrollbar-track{background:#f5f5f5}
body.light ::-webkit-scrollbar-thumb{background:#ccc}
body.light ::-webkit-scrollbar-thumb:hover{background:#aaa}
body.light .login-box{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.1)}
body.light .login-box h2{color:#c0392b}
body.light .login-box p{color:#666}
body.light .login-box input{background:#f5f5f5;border-color:#ddd;color:#333}
body.light .login-box input:focus{border-color:#c0392b}
body.light .login-box .hint{color:#888}
body.light .modal{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15)}
body.light .modal h3{color:#c0392b}
body.light .modal input{background:#f5f5f5;border-color:#ddd;color:#333}

.theme-toggle{font-size:18px;background:transparent!important;border:none!important;cursor:pointer;padding:4px 8px!important;line-height:1}
.theme-toggle:hover{opacity:0.7}

/* Custom color toolbar buttons */
.color-btn-group{display:inline-flex;align-items:center;gap:2px;margin:0 4px;vertical-align:middle}
.color-btn-group input[type=color]{width:26px;height:26px;border:1px solid #0f3460;border-radius:3px;padding:1px;background:transparent;cursor:pointer}
.color-btn-group input[type=color]:hover{border-color:#e94560}
body.light .color-btn-group input[type=color]{border-color:#ddd}
body.light .color-btn-group input[type=color]:hover{border-color:#c0392b}
.color-btn-group .color-label{font-size:10px;color:#a0a0b0;margin-right:4px}
body.light .color-btn-group .color-label{color:#888}

/* Empty state - absolutely positioned overlay, NOT flex child */

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .hamburger{display:block}

  .header{padding:6px 10px;min-height:42px}
  .header h1{font-size:14px}
  .header .actions{gap:4px}
  .header .actions button{padding:5px 8px;font-size:11px}
  .header .toggle-btn{padding:3px 6px;font-size:10px}

  /* Sidebar = overlay from left */
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:2px 0 12px rgba(0,0,0,.3)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.open{display:block}

  /* Make sidebar items more touch-friendly */
  .sidebar .folder-header{padding:10px 14px;font-size:14px;min-height:42px;align-items:center}
  .sidebar .file{padding:11px 14px 11px 30px;font-size:13.5px;min-height:44px}

  /* Toolbar */
  .toolbar{padding:5px 8px;gap:4px;min-height:32px}
  .toolbar .path{font-size:10px}
  .toolbar .status{font-size:9px;padding:2px 6px}

  /* Hide mode indicator on very narrow screens */
  .mode-indicator{display:none!important}

  /* Editor takes full width */
  .editor-area{width:100%}

  /* Toast UI editor adjustments */
  .toastui-editor-defaultUI-toolbar button{min-width:24px!important;height:24px!important;padding:1px!important;margin:0!important}
  .toastui-editor-md-container .toastui-editor{font-size:14px!important}
  .toastui-editor-ww-container .toastui-editor{font-size:14px!important}
  .ProseMirror{font-size:14px!important}
  .toastui-editor-contents{font-size:14px!important}

  /* Modal */
  .modal{min-width:auto;width:90vw;padding:20px;max-width:360px}
  .login-box{max-width:90vw;padding:24px 20px}
  .login-box h2{font-size:16px}

  /* Empty state */

  /* Color buttons on mobile */
  .color-btn-group{margin:0 2px}
  .color-btn-group input[type=color]{width:22px;height:22px}

  /* Make scrollbar thinner on mobile */
  ::-webkit-scrollbar{width:4px}
}

.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#16213e;padding:30px 40px;border-radius:12px;text-align:center;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.login-box h2{color:#e94560;margin-bottom:8px}
.login-box p{color:#a0a0b0;margin-bottom:20px;font-size:14px}
.login-box input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-family:monospace;font-size:13px;margin-bottom:16px}
.login-box input:focus{outline:none;border-color:#e94560}
.login-box .hint{font-size:12px;color:#888;margin-top:12px;line-height:1.6}
.login-box .hint a{color:#e94560}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#16213e;padding:24px 32px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:320px}
.modal h3{color:#e94560;margin-bottom:12px}
.modal input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-size:14px;margin-bottom:16px}
.modal input:focus{outline:none;border-color:#e94560}
.modal .btns{display:flex;gap:10px;justify-content:flex-end}

button{background:#0f3460;color:#e0e0e0;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12.5px;transition:all .2s}
button:hover{background:#1a4a8a}
button.primary{background:#e94560}
button.primary:hover{background:#ff6b6b}
button.toggle-btn{background:#0f3460;border:1px solid #1a4a8a;font-size:11px;padding:4px 10px}
button.toggle-btn.wysiwyg{background:#155724;border-color:#2e7d32;color:#81c784}
button.toggle-btn:hover{opacity:0.85}

/* ===== Split Preview Layout ===== */
.editor-panes{display:flex;flex:1;overflow:hidden;position:relative}
.editor-panes .editor-col{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}
.editor-panes .preview-col{width:45%;min-width:280px;overflow:hidden;display:flex;flex-direction:column;border-left:1px solid #0f3460;background:#1e1e35}
body.light .editor-panes .preview-col{background:#fafafa;border-left-color:#e0e0e0}

/* Resizer */
.editor-panes .resizer{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:10}
.editor-panes .resizer:hover,.editor-panes .resizer.active{background:#e94560}
body.light .editor-panes .resizer:hover,body.light .editor-panes .resizer.active{background:#c0392b}

/* Preview Toolbar */
.preview-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;min-height:30px}
body.light .preview-toolbar{background:#fff;border-color:#e0e0e0}
.preview-toolbar span{font-size:11px;color:#a0a0b0}
.preview-toolbar button{font-size:10px;padding:2px 8px;border-radius:3px}
.preview-toolbar button.active{background:#e94560;color:#fff}
body.light .preview-toolbar span{color:#888}

/* Preview Content */
.preview-content{flex:1;overflow-y:auto;padding:24px 28px;font-size:15px;line-height:1.8;color:#e0e0e0}
body.light .preview-content{color:#333}
.preview-content h1{font-size:1.8em;color:#e94560;border-bottom:2px solid #0f3460;padding-bottom:8px;margin:24px 0 16px}
.preview-content h2{font-size:1.4em;color:#ff6b6b;border-bottom:1px solid #0f3460;padding-bottom:6px;margin:20px 0 12px}
.preview-content h3{font-size:1.15em;color:#ffa07a;margin:16px 0 10px}
.preview-content h4{font-size:1.05em;margin:12px 0 8px}
body.light .preview-content h1{color:#c0392b;border-color:#ddd}
body.light .preview-content h2{color:#d35400;border-color:#eee}
body.light .preview-content h3{color:#e67e22}
.preview-content code{background:#2d2d4a;padding:2px 6px;border-radius:3px;font-size:0.9em;font-family:'Consolas','Monaco',monospace;color:#81c784}
body.light .preview-content code{background:#f0f0f0;color:#c0392b}
.preview-content pre{background:#2d2d4a;padding:16px;border-radius:6px;overflow-x:auto;margin:12px 0}
body.light .preview-content pre{background:#f5f5f5}
.preview-content pre code{background:transparent;padding:0;font-size:0.85em;line-height:1.6}
.preview-content blockquote{border-left:3px solid #e94560;padding:8px 16px;margin:12px 0;color:#a0a0b0;background:rgba(233,69,96,.05)}
body.light .preview-content blockquote{border-left-color:#c0392b;color:#666;background:#f9f9f9}
.preview-content table{width:100%;border-collapse:collapse;margin:12px 0}
.preview-content th,.preview-content td{border:1px solid #0f3460;padding:8px 12px;text-align:left}
body.light .preview-content th,body.light .preview-content td{border-color:#ddd}
.preview-content th{background:#16213e;font-weight:600}
body.light .preview-content th{background:#f5f5f5}
.preview-content img{max-width:100%;border-radius:4px;margin:8px 0}
.preview-content a{color:#e94560}
body.light .preview-content a{color:#c0392b}
.preview-content ul,.preview-content ol{padding-left:24px;margin:8px 0}
.preview-content li{margin:4px 0}
.preview-content p{margin:8px 0}
.preview-content hr{border:none;border-top:1px solid #0f3460;margin:16px 0}
.preview-content .katex{font-size:1.1em}

/* Outline / TOC */
.outline-panel{position:absolute;right:8px;top:36px;width:220px;max-height:60vh;background:#16213e;border:1px solid #0f3460;border-radius:8px;overflow-y:auto;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,.4);display:none}
.outline-panel.open{display:block}
body.light .outline-panel{background:#fff;border-color:#e0e0e0;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.outline-panel .outline-item{display:block;padding:5px 12px;font-size:12px;color:#a0a0b0;cursor:pointer;border-left:2px solid transparent;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.outline-panel .outline-item:hover{background:#0f3460;color:#e0e0e0}
body.light .outline-panel .outline-item{color:#666}
body.light .outline-panel .outline-item:hover{background:#f0f0f0;color:#333}
.outline-panel .outline-item.h1{font-weight:600;padding-left:8px;font-size:12.5px}
.outline-panel .outline-item.h2{padding-left:18px}
.outline-panel .outline-item.h3{padding-left:28px}
.outline-panel .outline-item.active{color:#e94560;border-left-color:#e94560}
body.light .outline-panel .outline-item.active{color:#c0392b;border-left-color:#c0392b}

/* Mobile preview toggle */
.preview-toggle-btn{font-size:9px;padding:1px 6px;margin:0;line-height:1.4}

@media (max-width: 768px) {
  .editor-panes{flex-direction:column}
  .editor-panes .preview-col{width:100%!important;min-width:0;height:35%;border-left:none;border-top:1px solid #0f3460}
  body.light .editor-panes .preview-col{border-top-color:#e0e0e0}
  .editor-panes .resizer{display:none}
  .outline-panel{right:4px;width:200px;max-height:50vh}
  .preview-content{padding:16px 20px;font-size:14px}
}

/* Word count */
.word-count{font-size:9px;color:#666;white-space:nowrap;flex-shrink:0;min-width:40px;text-align:center}
body.light .word-count{color:#999}

/* Draft toast */
/* Focus Mode */
body.focus .header,body.focus .sidebar,body.focus .sidebar-backdrop,body.focus .toolbar,body.focus .preview-col,body.focus .resizer{display:none!important}
body.focus .editor-area{flex:1}
body.focus .editor-panes{flex:1}
body.focus .editor-col{flex:1!important}
.focus-indicator{position:fixed;top:10px;right:16px;background:rgba(233,69,96,.9);color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
body.focus .focus-indicator{opacity:1}
body.light .focus-indicator{background:rgba(192,57,43,.9)}

/* Image drop zone */
.drop-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(233,69,96,.15);border:3px dashed #e94560;z-index:500;display:none;align-items:center;justify-content:center;font-size:24px;color:#e94560;pointer-events:none}
.drop-overlay.show{display:flex}
body.light .drop-overlay{background:rgba(192,57,43,.1);border-color:#c0392b;color:#c0392b}

<body>

    <h2>🔑 输入 GitHub Token</h2>
    <p>需要 repo 权限来保存笔记</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />

      已生成 token？打开 GitHub <a href="https://github.com/settings/tokens" target="_blank">Token 页面</a> 复制粘贴到这里<br />

<div class="modal-overlay" id="newFileModal" style="display:none">
  <div class="modal">
    <h3>新建笔记</h3>
    <input type="text" id="newFileName" placeholder="文件名，如 4.8_线性变换.md" />

<div class="header" id="mainUI" style="display:none">
  <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" title="文件列表">☰</button>

    <button class="primary" id="saveBtn" onclick="saveFile()">💾 保存</button>

<div class="main" id="mainUI2" style="display:none">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar"></div>
  <div class="editor-area">
    <div class="toolbar">
      <span class="path" id="filePath">选择左侧文件开始编辑</span>
      <span class="word-count" id="wordCount" title="字数统计">0 字</span>

      <span class="mode-indicator" id="modeIndicator">📝 Markdown</span>
      <span class="status idle" id="status">等待中</span>
    </div>
    <div class="editor-panes" id="editorPanes">
      <div class="editor-col" id="editorCol">
        <div class="editor-wrap" id="editorWrap" style="flex:1;overflow:hidden"></div>

      <div class="resizer" id="resizer"></div>

        </div>

          <p style="color:#888;text-align:center;margin-top:40px">选择文件开始预览</p>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<script>
var REPO = "hx303/notes";
var BRANCH = "v4";
var token = localStorage.getItem("gh_token") || "";
var currentFile = null;
var currentSha = "";
var files = [];
var editor = null;
var currentMode = localStorage.getItem("editor_mode") || "markdown";

function setStatus(s) {
  var el = document.getElementById("status");
  el.textContent = s.text;
  el.className = "status " + s.cls;
}

async function githubAPI(path, method, body) {
  var opts = {
    method: method,
    headers: {
      "Authorization": "Bearer " + token,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28"
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch("https://api.github.com/repos/" + REPO + "/" + path, opts);
  if (!r.ok) {
    var err = await r.json().catch(function(){return {}});
    throw new Error(err.message || r.statusText);
  }
  return r.status === 204 ? null : r.json();
}

function initEditor() {
  if (editor) return;
  var el = document.getElementById("editorCol");
  // Insert editor wrapper
  var wrap = document.createElement("div");
  wrap.id = "editorWrap";
  wrap.style.cssText = "flex:1;overflow:hidden";
  el.appendChild(wrap);
  editor = new toastui.Editor({
    el: wrap,
    height: "100%",
    initialEditType: currentMode,
    previewStyle: currentMode === "wysiwyg" ? "tab" : "vertical",
    usageStatistics: false,
    toolbarItems: [
      ["heading", "bold", "italic", "strike"],
      ["ul", "ol", "quote"],
      ["table", "link", "code", "codeblock"],
      ["scrollSync"]
    ],
    plugins: [],
    customHTMLRenderer: {
      htmlInline: {
        span: function(node, context) {
          var attrs = node.attrs || {};
          var style = attrs.style || '';
          if (!style) {
            return { type: 'html', content: context.origin() };
          }
          return { type: 'html', content: '<span style="' + style + '">' + (node.literal || '') + '</span>' };
        }
      }
    }
  });

  // Add custom color pickers via official insertToolbarItem API
  setTimeout(function() { addColorButtons(); }, 200);
  updateModeUI();

  // Wire up preview + auto-save + word count on content change
  editor.on("change", function() { schedulePreview(); scheduleAutoSave(); updateWordCount(); });
}

function addColorButtons() {
  if (!editor) return;

  try {
    var forePicker = document.createElement('input');
    forePicker.type = 'color';
    forePicker.value = '#e0e0e0';
    forePicker.title = '文字颜色';
    forePicker.style.cssText = 'width:24px;height:24px;border:1px solid #0f3460;border-radius:3px;padding:0;cursor:pointer;background:transparent;vertical-align:middle';
    forePicker.addEventListener('input', function(e) { applyColor(e.target.value, 'color'); });

    var backPicker = document.createElement('input');
    backPicker.type = 'color';
    backPicker.value = '#000000';
    backPicker.title = '背景高亮';
    backPicker.style.cssText = 'width:24px;height:24px;border:1px solid #0f3460;border-radius:3px;padding:0;cursor:pointer;background:transparent;vertical-align:middle;margin-left:2px';
    backPicker.addEventListener('input', function(e) { applyColor(e.target.value, 'background-color'); });

    editor.insertToolbarItem({ groupIndex: 0, itemIndex: 0 }, {
      name: 'foreColor', tooltip: '文字颜色', el: forePicker
    });
    editor.insertToolbarItem({ groupIndex: 0, itemIndex: 1 }, {
      name: 'backColor', tooltip: '背景高亮', el: backPicker
    });
  } catch(e) {
    console.warn('addColorButtons failed:', e);
  }
}

function applyColor(color, prop) {
  if (!editor) return;
  var md = editor.getMarkdown();
  var sel = editor.getSelection();
  if (!sel || !Array.isArray(sel) || sel[0] === sel[1]) return;
  var before = md.substring(0, sel[0]);
  var after = md.substring(sel[1]);
  var selText = md.substring(sel[0], sel[1]);
  editor.setMarkdown(before + '<span style="' + prop + ':' + color + '">' + selText + '</span>' + after, true);
}

function toggleEditorMode() {
  if (!editor) return;
  if (currentMode === "markdown") {
    currentMode = "wysiwyg";
    editor.changeMode("wysiwyg");
  } else {
    currentMode = "markdown";
    editor.changeMode("markdown");
  }
  localStorage.setItem("editor_mode", currentMode);
  updateModeUI();
  setStatus({text:"已切换到 " + (currentMode==="wysiwyg"?"可视化":"Markdown") + " 模式",cls:"idle"});
}

function updateModeUI() {
  var btn = document.getElementById("modeToggle");
  var ind = document.getElementById("modeIndicator");
  if (currentMode === "wysiwyg") {
    btn.textContent = "📝 Markdown";
    btn.className = "toggle-btn";
    ind.textContent = "✨ 可视化";
    ind.style.background = document.body.classList.contains("light") ? "#e8f5e9" : "#155724";
    ind.style.color = document.body.classList.contains("light") ? "#2e7d32" : "#81c784";
  } else {
    btn.textContent = "✨ 可视化";
    btn.className = "toggle-btn wysiwyg";
    ind.textContent = "📝 Markdown";
    ind.style.background = document.body.classList.contains("light") ? "#f0f0f0" : "#0f3460";
    ind.style.color = document.body.classList.contains("light") ? "#c0392b" : "#e94560";
  }
}

function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
  updateModeUI();
}

async function loadFiles() {
  setStatus({text:"加载中...",cls:"saving"});
  try {
    var tree = await githubAPI("git/trees/" + BRANCH + "?recursive=1", "GET");
    var contentFiles = tree.tree.filter(function(f) {
      return f.path.startsWith("content/") && f.path.endsWith(".md");
    });
    var folders = {};
    contentFiles.forEach(function(f) {
      var parts = f.path.replace("content/","").split("/");
      var folderPath = parts.slice(0,-1).join("/");
      var fileName = parts[parts.length-1];
      if (!folders[folderPath]) folders[folderPath] = {name: folderPath, files: [], open: true};
      folders[folderPath].files.push({name: fileName, path: f.path, sha: f.sha});
    });
    files = Object.values(folders).sort(function(a,b){return a.name.localeCompare(b.name,"zh")});
    renderSidebar();
    setStatus({text:"就绪",cls:"idle"});
  } catch(e) {
    setStatus({text:"加载失败: "+e.message,cls:"error"});
    if (e.message.indexOf("401")>-1){localStorage.removeItem("gh_token");location.reload();}
  }
}

function renderSidebar() {
  var sb = document.getElementById("sidebar");
  sb.innerHTML = files.map(function(folder, fi) {
    var displayName = folder.name || "根目录";
    return '<div class="folder'+(folder.open?" open":"")+'" id="folder'+fi+'">'+
      '<div class="folder-header" onclick="toggleFolder('+fi+')">'+
        '<span class="arrow">\u25b6</span>\ud83d\udcc1 ' + escapeHtml(displayName) +
        ' <small style="color:#666;margin-left:auto">'+folder.files.length+'</small>'+
      '</div>'+
      '<div class="files">'+
        folder.files.map(function(f, i2) {
          return '<div class="file" id="file'+fi+'_'+i2+'" onclick="openFile('+fi+','+i2+')">'+
            '\ud83d\udcc4 ' + escapeHtml(f.name)+
          '</div>';
        }).join("")+
      '</div>'+
    '</div>';
  }).join("");
}

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function toggleFolder(i){document.getElementById("folder"+i).classList.toggle("open");}

/* Sidebar toggle for mobile */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarBackdrop").classList.toggle("open");
}
/* Close sidebar when a file is selected on mobile */
function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarBackdrop").classList.remove("open");
  }
}

function decodeContent(b64) {
  try {
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder("utf-8").decode(bytes);
  } catch(e) {
    return atob(b64);
  }
}

function encodeContent(str) {
  try {
    var encoded = encodeURIComponent(str);
    var result = "";
    for (var i = 0; i < encoded.length; i++) {
      if (encoded[i] === '%') {
        result += String.fromCharCode(parseInt(encoded.substr(i+1, 2), 16));
        i += 2;
      } else {
        result += encoded.charCodeAt(i) > 127
          ? String.fromCharCode(encoded.charCodeAt(i))
          : encoded[i];
      }
    }
    return btoa(result);
  } catch(e) {
    return btoa(unescape(encodeURIComponent(str)));
  }
}

async function openFile(fi, i2) {
  var f = files[fi].files[i2];
  closeSidebarOnMobile();
  document.querySelectorAll(".file.active").forEach(function(el){el.classList.remove("active")});
  document.getElementById("file"+fi+"_"+i2).classList.add("active");
  setStatus({text:"加载中...",cls:"saving"});
  try {
    var data = await githubAPI("contents/" + f.path + "?ref=" + BRANCH, "GET");
    var content = decodeContent(data.content);
    currentSha = data.sha;
    currentFile = f;
    initEditor();

    // Check for existing draft
    var draftKey = getDraftKey(f.path);
    var draftRaw = localStorage.getItem(draftKey);
    if (draftRaw) {
      try {
        var draft = JSON.parse(draftRaw);
        var mins = Math.round((Date.now() - draft.time) / 60000);
        if (mins >= 1 && draft.content !== content) {
          // Show draft restore modal, defer editor content setting
          document.getElementById("draftInfo").textContent = "文件: " + f.path + "\n草稿保存于: " + new Date(draft.time).toLocaleString() + " (" + mins + " 分钟前)";
          document.getElementById("draftWarning").textContent = draft.sha && draft.sha !== currentSha ? "⚠ 草稿版本可能与服务器不一致" : "";
          document.getElementById("draftModal").style.display = "flex";
          pendingDraftFile = f.path;
          // Set GitHub content now, restoreDraft() or discardDraft() will handle the final state
          editor.setMarkdown(content, false);
          setStatus({text:"已加载（有未恢复的草稿）",cls:"idle"});
        } else {
          editor.setMarkdown(content, false);
        }
      } catch(e) {
        editor.setMarkdown(content, false);
      }
    } else {
      editor.setMarkdown(content, false);
    }
    document.getElementById("filePath").textContent = f.path;
    setStatus({text:"已加载 — 当前模式: " + (currentMode==="wysiwyg"?"可视化":"Markdown"),cls:"idle"});
    renderPreview();
    updateWordCount();
  } catch(e) {
    setStatus({text:"加载失败: "+e.message,cls:"error"});
  }
}

async function saveFile() {
  if (!editor || !currentFile) return alert("请先选择一个文件");
  var content = editor.getMarkdown();
  setStatus({text:"保存中...",cls:"saving"});
  document.getElementById("saveBtn").disabled = true;
  var maxRetries = 1;
  for (var attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      var encoded = encodeContent(content);
      var result = await githubAPI("contents/" + currentFile.path, "PUT", {
        message: "Update " + currentFile.name + " via admin editor",
        content: encoded,
        sha: currentSha,
        branch: BRANCH
      });
      // Update SHA from server response, never leave it stale
      currentSha = result && result.content ? result.content.sha : "";
      setStatus({text:"已保存！正在触发自动部署...",cls:"saving"});
      clearDraft(currentFile.path);
      triggerDeploy();
      break;
    } catch(e) {
      if (attempt < maxRetries && (!currentSha || (e.message && e.message.indexOf("does not match") > -1))) {
        setStatus({text:"自动同步最新版本...",cls:"saving"});
        try {
          var fresh = await githubAPI("contents/" + currentFile.path + "?ref=" + BRANCH, "GET");
          currentSha = fresh.sha;
          continue;
        } catch(fetchErr) {
          break;
        }
      }
      setStatus({text:"保存失败: " + e.message, cls:"error"});
    }
  }
  document.getElementById("saveBtn").disabled = false;
}

async function triggerDeploy() {
  try {
    var resp = await fetch("https://api.github.com/repos/hx303/notes/actions/workflows/285508720/dispatches", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json"
      },
      body: JSON.stringify({ ref: "v4" })
    });
    if (resp.ok) {
      setStatus({ text: "部署已触发！1-2 分钟后上线 wouldkeep.com", cls: "saved" });
    } else {
      var err = await resp.text();
      setStatus({ text: "已保存，但部署触发失败: " + resp.status, cls: "error" });
    }
  } catch (e) {
    setStatus({ text: "已保存，但部署触发失败: " + e.message, cls: "error" });
  }
  setTimeout(function () { setStatus({ text: "就绪", cls: "idle" }); }, 8000);
}

/* ====== Split Preview + Outline ====== */
var previewVisible = true;
var outlineOpen = false;

/* ====== Auto-save Draft ====== */
var draftKeyPrefix = "draft_";
var draftTimer = null;
var draftLastSaved = 0;
var pendingDraftFile = null;

function getDraftKey(filePath) { return draftKeyPrefix + filePath; }

function autoSaveDraft() {
  if (!editor || !currentFile) return;
  var content = editor.getMarkdown();
  if (!content) return;
  var key = getDraftKey(currentFile.path);
  localStorage.setItem(key, JSON.stringify({ content: content, sha: currentSha, time: Date.now() }));
  draftLastSaved = Date.now();
  showDraftToast();
}

function showDraftToast() {
  var id = "draftToast";
  var el = document.getElementById(id);
  if (!el) { el = document.createElement("div"); el.id = id; el.className = "draft-toast"; document.body.appendChild(el); }
  el.textContent = "已自动保存草稿 " + new Date().toLocaleTimeString();
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 1500);
}

function scheduleAutoSave() {
  if (draftTimer) clearTimeout(draftTimer);
  draftTimer = setTimeout(autoSaveDraft, 2000);
}


function restoreDraft() {
  var key = getDraftKey(pendingDraftFile);
  var raw = localStorage.getItem(key);
  if (!raw) return;
  var draft = JSON.parse(raw);
  editor.setMarkdown(draft.content, false);
  currentSha = draft.sha;
  localStorage.removeItem(key);
  document.getElementById("draftModal").style.display = "none";
  setStatus({ text: "草稿已恢复", cls: "saved" });
  schedulePreview();
  pendingDraftFile = null;
}

function discardDraft() {
  if (pendingDraftFile) localStorage.removeItem(getDraftKey(pendingDraftFile));
  document.getElementById("draftModal").style.display = "none";
  pendingDraftFile = null;
}

function clearDraft(filePath) {
  if (filePath) localStorage.removeItem(getDraftKey(filePath));
}

/* ====== Word Count ====== */
function updateWordCount() {
  if (!editor) return;
  var md = editor.getMarkdown();
  // Strip YAML frontmatter
  md = md.replace(/^---[\s\S]*?---\n*/, "");
  // Strip markdown syntax
  var plain = md.replace(/[#*_~`>\[\]()|{}\-!]/g, "").replace(/\$\$[\s\S]*?\$\$/g, "").replace(/\$[^$]+\$/g, "").replace(/<[^>]+>/g, "").replace(/\n+/g, "\n").trim();
  // Chinese characters
  var cn = (plain.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
  // English words
  var en = (plain.match(/[a-zA-Z]+/g) || []).length;
  // Digits
  var digits = (plain.match(/\d+/g) || []).length;
  var el = document.getElementById("wordCount");
  var parts = [];
  if (cn) parts.push(cn + "汉字");
  if (en) parts.push(en + "词");
  if (!cn && !en) parts.push("0 字");
  el.textContent = parts.join(" ") + (digits ? " · " + digits + "数" : "");
  el.title = "中文字数: " + cn + "\n英文词数: " + en + "\n数字组: " + digits + "\n总字符: " + plain.length;
}

/* ====== End Word Count ====== */

// Configure marked with KaTeX support
marked.setOptions({ breaks: true, gfm: true });

// Render markdown to HTML preview
function renderPreview() {
  if (!editor) return;
  var md = editor.getMarkdown();
  var pc = document.getElementById("previewContent");
  try {
    var html = marked.parse(md);
    // Replace \(...\) and $$...$$ with placeholders, render KaTeX, put back
    html = renderMath(html);
    pc.innerHTML = html;
    // Render any remaining KaTeX
    if (typeof renderMathInElement !== "undefined") {
      renderMathInElement(pc, { delimiters: [{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false},{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}], throwOnError: false });
    }
    buildOutline(md);
  } catch(e) {
    pc.innerHTML = "<p style='color:#f44336'>Preview error: " + e.message + "</p>";
  }
}

// Pre-process math formulas for marked (preserve from markdown escaping)
function renderMath(html) {
  // Protect display math
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, '<span class="math-display">$$\n$1\n$$</span>');
  // Protect inline math (but not $ inside code blocks)
  html = html.replace(/(?<!`) \$([^$]+?)\$ /g, ' <span class="math-inline">$$1$</span> ');
  return html;
}

// Debounced preview update
var previewTimer = null;
function schedulePreview() {
  if (previewTimer) clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 300);
}

// Build outline from headings
function buildOutline(md) {
  var panel = document.getElementById("outlinePanel");
  var re = /^(#{1,4})\s+(.+)$/gm;
  var items = [];
  var match;
  while ((match = re.exec(md)) !== null) {
    items.push({ level: match[1].length, text: match[2].trim(), pos: match.index });
  }
  if (items.length === 0) {
    panel.innerHTML = "<div style='padding:8px 12px;color:#888;font-size:12px'>无标题</div>";
    return;
  }
  panel.innerHTML = items.map(function(item) {
    return "<a class='outline-item h" + item.level + "' onclick='scrollToHeading(\"" + escapeHtmlAttr(item.text) + "\")'>" + escapeHtml(item.text) + "</a>";
  }).join("");
}

function escapeHtmlAttr(s) { return s.replace(/"/g, "&quot;").replace(/\\/g, "\\\\"); }

// Scroll preview to heading
function scrollToHeading(text) {
  var pc = document.getElementById("previewContent");
  var headings = pc.querySelectorAll("h1,h2,h3,h4");
  for (var i = 0; i < headings.length; i++) {
    if (headings[i].textContent.trim() === text) {
      headings[i].scrollIntoView({ behavior: "smooth", block: "start" });
      // Highlight
      document.querySelectorAll(".outline-item.active").forEach(function(el){el.classList.remove("active")});
      var items = document.querySelectorAll(".outline-item");
      for (var j = 0; j < items.length; j++) {
        if (items[j].textContent.trim() === text) { items[j].classList.add("active"); break; }
      }
      return;
    }
  }
}

// Toggle outline panel
function toggleOutline() {
  outlineOpen = !outlineOpen;
  var panel = document.getElementById("outlinePanel");
  var btn = document.getElementById("outlineToggle");
  if (outlineOpen) { panel.classList.add("open"); if(editor)renderPreview(); btn.classList.add("active"); }
  else { panel.classList.remove("open"); btn.classList.remove("active"); }
}

// Toggle preview visibility
function togglePreview() {
  previewVisible = !previewVisible;
  var col = document.getElementById("previewCol");
  var resizer = document.getElementById("resizer");
  if (previewVisible) { col.style.display = ""; resizer.style.display = ""; }
  else { col.style.display = "none"; resizer.style.display = "none"; }
}

// Resizer drag
var resizing = false;
document.getElementById("resizer").addEventListener("mousedown", function(e) {
  resizing = true;
  document.getElementById("resizer").classList.add("active");
  document.body.style.cursor = "col-resize";
  document.body.style.userSelect = "none";
  e.preventDefault();
});
document.addEventListener("mousemove", function(e) {
  if (!resizing) return;
  var panes = document.getElementById("editorPanes");
  var rect = panes.getBoundingClientRect();
  var pct = ((rect.right - e.clientX) / rect.width) * 100;
  pct = Math.max(20, Math.min(60, pct));
  document.getElementById("previewCol").style.width = pct + "%";
  document.getElementById("editorCol").style.flex = "1";
});
document.addEventListener("mouseup", function() {
  if (resizing) {
    resizing = false;
    document.getElementById("resizer").classList.remove("active");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  }
});

/* ====== Focus Mode ====== */
var focusMode = false;
function toggleFocus() {
  focusMode = !focusMode;
  if (focusMode) { document.body.classList.add("focus"); document.getElementById("focusBtn").classList.add("active"); document.getElementById("focusBtn").textContent = "🔳 退出"; }
  else { document.body.classList.remove("focus"); document.getElementById("focusBtn").classList.remove("active"); document.getElementById("focusBtn").textContent = "🔲 专注"; }
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && focusMode) { e.preventDefault(); toggleFocus(); }
});
/* ====== End Focus Mode ====== */

/* ====== Image Drag & Drop Upload ====== */
var dragCounter = 0;
var allowedImageTypes = ["image/png","image/jpeg","image/gif","image/webp","image/svg+xml"];
var maxImageSize = 5 * 1024 * 1024; // 5MB

['dragenter','dragover','dragleave','drop'].forEach(function(evt) {
  document.addEventListener(evt, function(e) { e.preventDefault(); e.stopPropagation(); });
});

document.addEventListener("dragenter", function(e) {
  dragCounter++;
  if (dragCounter === 1) document.getElementById("dropOverlay").classList.add("show");
});
document.addEventListener("dragleave", function(e) {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; document.getElementById("dropOverlay").classList.remove("show"); }
});
document.addEventListener("drop", function(e) {
  dragCounter = 0;
  document.getElementById("dropOverlay").classList.remove("show");
  if (!currentFile) { setStatus({text:"请先打开一个文件，再拖入图片",cls:"error"}); return; }
  var files = e.dataTransfer.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    if (allowedImageTypes.indexOf(files[i].type) === -1) { setStatus({text:"不支持的文件类型: " + files[i].type + "（支持 PNG/JPG/GIF/WebP/SVG）",cls:"error"}); continue; }
    if (files[i].size > maxImageSize) { setStatus({text:"文件过大: " + (files[i].size/1024/1024).toFixed(1) + "MB（限制 5MB）",cls:"error"}); continue; }
    uploadImage(files[i]);
  }
});

function uploadImage(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var base64 = ev.target.result.split(",")[1];
    var now = new Date();
    var timestamp = now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2) + ("0"+now.getSeconds()).slice(-2);
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    var imgPath = "static/images/" + timestamp + "_" + safeName;
    setStatus({text:"上传中: " + safeName + "...",cls:"saving"});
    githubAPI("contents/" + imgPath, "PUT", {
      message: "Upload image " + safeName + " via admin editor",
      content: base64,
      branch: BRANCH
    }).then(function(resp) {
      var imgUrl = "/" + imgPath;
      // Insert markdown image at cursor
      var md = editor.getMarkdown();
      var sel = editor.getSelection();
      var pos = (sel && Array.isArray(sel)) ? sel[0] : md.length;
      var newMd = md.substring(0, pos) + "\n![" + (file.name.replace(/\.[^.]+$/,"")) + "](" + imgUrl + ")\n" + md.substring(pos);
      editor.setMarkdown(newMd, false);
      setStatus({text:"已插入: " + safeName,cls:"saved"});
      setTimeout(function(){setStatus({text:"就绪",cls:"idle"});},3000);
    }).catch(function(e) {
      setStatus({text:"上传失败: " + e.message,cls:"error"});
    });
  };
  reader.readAsDataURL(file);
}
/* ====== End Image Upload ====== */

/* ====== End Split Preview ====== */

function newFile() {
  if (!currentFile) { alert("请先选择一个文件夹（点击文件夹内的文件）"); return; }
  document.getElementById("newFileModal").style.display = "flex";
  document.getElementById("newFileName").focus();
}

function closeNewFile() { document.getElementById("newFileModal").style.display = "none"; }

async function createFile() {
  var name = document.getElementById("newFileName").value.trim();
  if (!name) return;
  if (!name.endsWith(".md")) name += ".md";
  var prefix = currentFile.path.replace(/\/[^\/]+$/,"");
  var newPath = prefix + "/" + name;
  var fm = "---\ntitle: \"" + name.replace(".md","") + "\"\ndate: " + new Date().toISOString().split("T")[0] + "\ncreated: " + new Date().toISOString().split("T")[0] + "\n---\n\n";
  try {
    var encoded = encodeContent(fm);
    await githubAPI("contents/" + newPath, "PUT", {
      message: "Create " + name,
      content: encoded,
      branch: BRANCH
    });
    closeNewFile();
    setStatus({text:"已创建: "+name,cls:"saved"});
    loadFiles();
  } catch(e) {
    setStatus({text:"创建失败: "+e.message,cls:"error"});
  }
}

function saveToken() {
  var t = document.getElementById("tokenInput").value.trim();
  if (!t) return;
  token = t;
  localStorage.setItem("gh_token", t);
  init();
}

function init() {
  if (!token) {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("mainUI").style.display = "none";
    document.getElementById("mainUI2").style.display = "none";
    return;
  }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainUI").style.display = "flex";
  document.getElementById("mainUI2").style.display = "flex";
  loadFiles();
}

document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveFile(); }
});

init();

// Restore theme
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

// Register PWA service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/admin/sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('SW failed:', err);
    });
  });
}

// Save draft on page unload
window.addEventListener("beforeunload", function() { if (editor && currentFile) autoSaveDraft(); });
</script>
