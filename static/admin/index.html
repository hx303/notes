<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>📝 笔记管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
.header{background:#16213e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460}
.header h1{font-size:18px;color:#e94560}
.header .actions{display:flex;gap:10px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:#16213e;overflow-y:auto;border-right:1px solid #0f3460;padding:10px 0}
.sidebar .folder{margin:2px 0}
.sidebar .folder-header{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;color:#a0a0b0;user-select:none}
.sidebar .folder-header:hover{background:#0f3460}
.sidebar .folder-header .arrow{font-size:10px;transition:transform .2s}
.sidebar .folder.open>.folder-header .arrow{transform:rotate(90deg)}
.sidebar .folder .files{max-height:0;overflow:hidden;transition:max-height .3s}
.sidebar .folder.open .files{max-height:2000px}
.sidebar .file{padding:6px 16px 6px 32px;cursor:pointer;font-size:13px;color:#c0c0d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar .file:hover{background:#0f3460}
.sidebar .file.active{background:#e94560;color:#fff}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:#16213e;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #0f3460}
.toolbar .path{flex:1;font-size:13px;color:#a0a0b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toolbar .status{font-size:12px;padding:4px 10px;border-radius:4px}
.toolbar .status.idle{background:#333;color:#888}
.toolbar .status.saved{background:#155724;color:#4caf50}
.toolbar .status.error{background:#721c24;color:#f44336}
.toolbar .status.saving{background:#1a5c2a;color:#81c784}
.editor-wrap{flex:1;display:flex;overflow:hidden}
.editor-wrap textarea{flex:1;background:#1a1a2e;color:#e0e0e0;border:none;padding:20px;font-family:"JetBrains Mono","Fira Code",monospace;font-size:14px;line-height:1.7;resize:none;outline:none;tab-size:2}
.editor-wrap textarea:focus{border:none;outline:none}
.preview{flex:1;padding:20px;overflow-y:auto;background:#1e1e35;border-left:1px solid #0f3460;display:none}
.preview.visible{display:block}
.preview h1{color:#e94560;margin-bottom:16px}
.preview h2{color:#ff6b6b;margin:16px 0 8px}
.preview h3{color:#ffa07a;margin:12px 0 6px}
.preview p{margin:8px 0;line-height:1.7}
.preview code{background:#2d2d4a;padding:2px 6px;border-radius:3px;font-size:13px}
.preview pre{background:#2d2d4a;padding:12px 16px;border-radius:6px;overflow-x:auto;margin:10px 0}
.preview blockquote{border-left:3px solid #e94560;padding-left:16px;color:#a0a0b0;margin:10px 0}
.preview table{border-collapse:collapse;width:100%;margin:10px 0}
.preview td,.preview th{border:1px solid #0f3460;padding:6px 12px;text-align:left}
.preview th{background:#16213e}
.preview a{color:#e94560}
button{background:#0f3460;color:#e0e0e0;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
button:hover{background:#1a4a8a}
button.primary{background:#e94560}
button.primary:hover{background:#ff6b6b}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#16213e;padding:30px 40px;border-radius:12px;text-align:center;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.login-box h2{color:#e94560;margin-bottom:8px}
.login-box p{color:#a0a0b0;margin-bottom:20px;font-size:14px}
.login-box input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-family:monospace;font-size:13px;margin-bottom:16px}
.login-box input:focus{outline:none;border-color:#e94560}
.login-box .hint{font-size:12px;color:#888;margin-top:12px;line-height:1.6}
.login-box .hint a{color:#e94560}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#16213e;padding:24px 32px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:300px}
.modal h3{color:#e94560;margin-bottom:12px}
.modal input{width:100%;padding:10px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-size:14px;margin-bottom:16px}
.modal input:focus{outline:none;border-color:#e94560}
.modal .btns{display:flex;gap:10px;justify-content:flex-end}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:16px;flex-direction:column;gap:12px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#0f3460;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#1a4a8a}
</style>
</head>
<body>

<div class="login-overlay" id="loginScreen">
  <div class="login-box">
    <h2>🔑 输入 GitHub Token</h2>
    <p>需要 <code>repo</code> 权限来保存笔记</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
    <button class="primary" onclick="saveToken()">进入编辑器</button>
    <div class="hint">
      如何获取？<br>
      <a href="https://github.com/settings/tokens" target="_blank">打开 GitHub Token 页面</a> →
      Generate new token (classic) → 勾选 <code>repo</code> → 生成后粘贴到这里<br>
      <small>Token 只存在你的浏览器里，不会上传</small>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newFileModal" style="display:none">
  <div class="modal">
    <h3>新建笔记</h3>
    <input type="text" id="newFileName" placeholder="文件名，如 4.8_线性变换.md"/>
    <div class="btns">
      <button onclick="closeNewFile()">取消</button>
      <button class="primary" onclick="createFile()">创建</button>
    </div>
  </div>
</div>

<div class="header" id="mainUI" style="display:none">
  <h1>📝 笔记后台</h1>
  <div class="actions">
    <button onclick="newFile()">＋ 新建</button>
    <button onclick="togglePreview()">👁 预览</button>
    <button class="primary" id="saveBtn" onclick="saveFile()">💾 保存</button>
  </div>
</div>
<div class="main" id="mainUI2" style="display:none">
  <div class="sidebar" id="sidebar"></div>
  <div class="editor-area">
    <div class="toolbar">
      <span class="path" id="filePath">选择左侧文件开始编辑</span>
      <span class="status idle" id="status">等待中</span>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" placeholder="在左边选一个文件开始编辑..."></textarea>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</div>
<div class="editor-area" id="emptyState">
  <div class="empty-state">
    <span style="font-size:48px">📂</span>
    <span>从左侧文件列表选择一个笔记开始编辑</span>
  </div>
</div>

<script>
var REPO = "wld030303/notes";
var BRANCH = "main";
var token = localStorage.getItem("gh_token") || "";
var currentFile = null;
var currentSha = "";
var files = [];

function md2html(md) {
  if (!md) return "";
  var h = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^#### (.+)$/gm,"<h4>$1</h4>")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/```(\w*)\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g,"<em>$1</em>")
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%"/>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>[\s\S]*?<\/li>)/g,function(m){return m.indexOf("\n")>-1?"<ul>"+m+"</ul>":m})
    .replace(/^(?!<[a-z])(.+)$/gm,function(p){return p.trim()?"<p>"+p+"</p>":p});
  h = h.replace(/<p>\s*<\/p>/g,"");
  return h;
}

function setStatus(s) {
  var el = document.getElementById("status");
  el.textContent = s.text;
  el.className = "status " + s.cls;
}
async function githubAPI(path, method, body) {
  var opts = {
    method: method,
    headers: {
      "Authorization": "Bearer " + token,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28"
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch("https://api.github.com/repos/" + REPO + "/" + path, opts);
  if (!r.ok) {
    var err = await r.json().catch(function(){return {}});
    throw new Error(err.message || r.statusText);
  }
  return r.status === 204 ? null : r.json();
}
async function loadFiles() {
  setStatus({text:"加载中...",cls:"saving"});
  try {
    var tree = await githubAPI("git/trees/" + BRANCH + "?recursive=1", "GET");
    var contentFiles = tree.tree.filter(function(f) {
      return f.path.startsWith("content/") && f.path.endsWith(".md");
    });
    var folders = {};
    contentFiles.forEach(function(f) {
      var parts = f.path.replace("content/","").split("/");
      var folderPath = parts.slice(0,-1).join("/");
      var fileName = parts[parts.length-1];
      if (!folders[folderPath]) folders[folderPath] = {name: folderPath, files: [], open: true};
      folders[folderPath].files.push({name: fileName, path: f.path, sha: f.sha});
    });
    files = Object.values(folders).sort(function(a,b){return a.name.localeCompare(b.name)});
    renderSidebar();
    setStatus({text:"就绪",cls:"idle"});
  } catch(e) {
    setStatus({text:"加载失败: "+e.message,cls:"error"});
    if (e.message.indexOf("401")>-1){localStorage.removeItem("gh_token");location.reload();}
  }
}
function renderSidebar() {
  var sb = document.getElementById("sidebar");
  sb.innerHTML = files.map(function(folder, fi) {
    var displayName = folder.name || "根目录";
    return '<div class="folder'+(folder.open?" open":"")+'" id="folder'+fi+'">'+
      '<div class="folder-header" onclick="toggleFolder('+fi+')">'+
        '<span class="arrow">▶</span>📁 ' + escapeHtml(displayName) +
        ' <small style="color:#666;margin-left:auto">'+folder.files.length+'</small>'+
      '</div>'+
      '<div class="files">'+
        folder.files.map(function(f, i2) {
          return '<div class="file" id="file'+fi+'_'+i2+'" onclick="openFile('+fi+','+i2+')">'+
            '📄 ' + escapeHtml(f.name)+
          '</div>';
        }).join("")+
      '</div>'+
    '</div>';
  }).join("");
}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function toggleFolder(i){document.getElementById("folder"+i).classList.toggle("open");}
async function openFile(fi, i2) {
  var f = files[fi].files[i2];
  document.querySelectorAll(".file.active").forEach(function(el){el.classList.remove("active")});
  document.getElementById("file"+fi+"_"+i2).classList.add("active");
  document.getElementById("emptyState").style.display = "none";
  setStatus({text:"加载中...",cls:"saving"});
  try {
    var data = await githubAPI("contents/" + f.path, "GET");
    currentContent = atob(data.content);
    currentSha = data.sha;
    currentFile = f;
    document.getElementById("editor").value = currentContent;
    document.getElementById("filePath").textContent = f.path;
    document.getElementById("preview").innerHTML = md2html(currentContent);
    setStatus({text:"已加载",cls:"idle"});
  } catch(e) {
    setStatus({text:"加载失败: "+e.message,cls:"error"});
  }
}
async function saveFile() {
  if (!currentFile) return alert("请先选择一个文件");
  var content = document.getElementById("editor").value;
  setStatus({text:"保存中...",cls:"saving"});
  document.getElementById("saveBtn").disabled = true;
  try {
    await githubAPI("contents/" + currentFile.path, "PUT", {
      message: "Update " + currentFile.name + " via admin editor",
      content: btoa(unescape(encodeURIComponent(content))),
      sha: currentSha,
      branch: BRANCH
    });
    currentSha = "";
    setStatus({text:"✅ 已保存",cls:"saved"});
    setTimeout(function(){setStatus({text:"就绪",cls:"idle"})},2000);
  } catch(e) {
    setStatus({text:"保存失败: "+e.message,cls:"error"});
  }
  document.getElementById("saveBtn").disabled = false;
}
function togglePreview() {
  var p = document.getElementById("preview");
  var textarea = document.getElementById("editor");
  if (p.classList.contains("visible")) {
    p.classList.remove("visible");
    textarea.style.flex = "1";
  } else {
    document.getElementById("preview").innerHTML = md2html(textarea.value);
    p.classList.add("visible");
    textarea.style.flex = "0.5";
  }
}
function newFile() {
  if (!currentFile) { alert("请先选择一个文件夹（点击文件夹内的文件）"); return; }
  document.getElementById("newFileModal").style.display = "flex";
  document.getElementById("newFileName").focus();
}
function closeNewFile() { document.getElementById("newFileModal").style.display = "none"; }
async function createFile() {
  var name = document.getElementById("newFileName").value.trim();
  if (!name) return;
  if (!name.endsWith(".md")) name += ".md";
  var prefix = currentFile.path.replace(/\/[^\/]+$/,"");
  var newPath = prefix + "/" + name;
  var fm = "---\ntitle: \"" + name.replace(".md","") + "\"\ndate: " + new Date().toISOString().split("T")[0] + "\n---\n\n";
  try {
    await githubAPI("contents/" + newPath, "PUT", {
      message: "Create " + name,
      content: btoa(unescape(encodeURIComponent(fm))),
      branch: BRANCH
    });
    closeNewFile();
    setStatus({text:"✅ 已创建: "+name,cls:"saved"});
    loadFiles();
  } catch(e) {
    setStatus({text:"创建失败: "+e.message,cls:"error"});
  }
}
function saveToken() {
  var t = document.getElementById("tokenInput").value.trim();
  if (!t) return;
  token = t;
  localStorage.setItem("gh_token", t);
  init();
}
function init() {
  if (!token) {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("mainUI").style.display = "none";
    document.getElementById("mainUI2").style.display = "none";
    document.getElementById("emptyState").style.display = "none";
    return;
  }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainUI").style.display = "flex";
  document.getElementById("mainUI2").style.display = "flex";
  document.getElementById("emptyState").style.display = "flex";
  loadFiles();
}
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveFile(); }
});
init();
</script>
</body>
</html>
