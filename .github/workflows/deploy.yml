name: Deploy to Vercel

on:
  push:
    branches:
      - v4
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Clean mp4 video files
        run: find public -name "*.mp4" -delete 2>/dev/null || true

      - name: Copy admin panel
        run: |
          mkdir -p public/admin
          cp -r static/admin/* public/admin/

      - name: Deploy to Vercel
        run: |
          npx vercel --cwd public --prod --token ${{ secrets.VERCEL_TOKEN }} --scope wld-s-projects --yes
