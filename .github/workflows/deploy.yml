name: Build & Deploy to Vercel

on:
  push:
    branches: [v4]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Copy image attachments
        run: node build_images.mjs

      - name: Copy admin editor
        run: cp -r static/admin public/admin/

      - name: Copy vercel.json
        run: cp vercel.json public/vercel.json

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }} \
            --cwd public \
            -A public/vercel.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
